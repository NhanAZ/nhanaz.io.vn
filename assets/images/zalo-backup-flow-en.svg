<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">Data flow inside a .zl.zip file</title>
  <desc id="desc">Block diagram showing TAR plaintext encrypted into .zl.zip ciphertext, then uin-derived key and IV are used to decrypt it back into TAR plaintext before validation and extraction.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0a0a0a"/>
    </marker>
    <style>
      .title { font: 700 30px "Space Grotesk", Arial, sans-serif; fill: #0a0a0a; }
      .caption { font: 400 17px "Space Grotesk", Arial, sans-serif; fill: #6b6b66; }
      .label { font: 700 20px "Space Grotesk", Arial, sans-serif; fill: #0a0a0a; }
      .sub { font: 400 14px "Space Grotesk", Arial, sans-serif; fill: #6b6b66; }
      .step { font: 700 11px "Space Grotesk", Arial, sans-serif; letter-spacing: .08em; fill: #6b6b66; }
      .box { fill: #ffffff; stroke: #0a0a0a; stroke-width: 2; }
      .soft { fill: #f3f3f0; stroke: #0a0a0a; stroke-width: 2; }
      .line { fill: none; stroke: #0a0a0a; stroke-width: 2; marker-end: url(#arrow); }
      .note { fill: #151412; stroke: #151412; stroke-width: 2; }
      .noteText { font: 700 18px "Space Grotesk", Arial, sans-serif; fill: #ffffff; }
      .noteSub { font: 400 13px "Space Grotesk", Arial, sans-serif; fill: #d8d4ca; }
    </style>
  </defs>

  <rect width="1120" height="540" fill="#ffffff"/>
  <text class="title" x="56" y="55">The ZIP extension is only the sign on the door</text>
  <text class="caption" x="56" y="86">The filename says “ZIP”, but the actual structure follows a different path.</text>

  <text class="step" x="56" y="132">WHEN THE BACKUP IS MADE</text>
  <rect class="box" x="56" y="152" width="210" height="90"/>
  <text class="label" x="82" y="190">TAR plaintext</text>
  <text class="sub" x="82" y="215">the real data inside</text>

  <path class="line" d="M266 197 H326"/>
  <rect class="soft" x="326" y="152" width="210" height="90"/>
  <text class="label" x="352" y="190">AES-256-CBC</text>
  <text class="sub" x="352" y="215">encrypted with key and IV</text>

  <path class="line" d="M536 197 H596"/>
  <rect class="box" x="596" y="152" width="220" height="90"/>
  <text class="label" x="622" y="190">.zl.zip ciphertext</text>
  <text class="sub" x="622" y="215">ZIP ending, not ZIP inside</text>

  <path class="line" d="M816 197 H876"/>
  <rect class="note" x="876" y="152" width="188" height="90"/>
  <text class="noteText" x="900" y="190">Signboard</text>
  <text class="noteSub" x="900" y="215">not a map</text>

  <text class="step" x="56" y="307">WHEN IT IS READ BACK</text>
  <rect class="box" x="56" y="327" width="180" height="92"/>
  <text class="label" x="80" y="365">.zl.zip</text>
  <text class="sub" x="80" y="390">ciphertext</text>

  <path class="line" d="M236 373 H276"/>
  <rect class="soft" x="276" y="327" width="180" height="92"/>
  <text class="label" x="300" y="365">Find uin</text>
  <text class="sub" x="300" y="390">from the live session</text>

  <path class="line" d="M456 373 H496"/>
  <rect class="soft" x="496" y="327" width="180" height="92"/>
  <text class="label" x="520" y="365">Build key and IV</text>
  <text class="sub" x="520" y="390">SHA-256, zie...</text>

  <path class="line" d="M676 373 H716"/>
  <rect class="soft" x="716" y="327" width="180" height="92"/>
  <text class="label" x="740" y="365">Decrypt</text>
  <text class="sub" x="740" y="390">AES-256-CBC</text>

  <path class="line" d="M896 373 H936"/>
  <rect class="box" x="936" y="327" width="128" height="92"/>
  <text class="label" x="958" y="365">TAR</text>
  <text class="sub" x="958" y="390">validate</text>
  <text class="sub" x="958" y="410">then extract</text>

  <path d="M146 242 V280 H1000 V327" fill="none" stroke="#d7d7d2" stroke-width="2" stroke-dasharray="7 8"/>
  <text class="caption" x="56" y="488">The important part is not the ZIP name, but that valid plaintext has TAR structure after decryption.</text>
</svg>
